name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -count=1

  build:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            cgo_enabled: 0
          - name: linux-arm64
            goos: linux
            goarch: arm64
            cgo_enabled: 0
          - name: windows-amd64
            goos: windows
            goarch: amd64
            cgo_enabled: 0
          - name: darwin-amd64
            goos: darwin
            goarch: amd64
            cgo_enabled: 0
            macosx_target: 10.14
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
            cgo_enabled: 0
            macosx_target: 11.0
          - name: freebsd-amd64
            goos: freebsd
            goarch: amd64
            cgo_enabled: 0
          - name: netbsd-amd64
            goos: netbsd
            goarch: amd64
            cgo_enabled: 0
          - name: openbsd-amd64
            goos: openbsd
            goarch: amd64
            cgo_enabled: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo_enabled }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_target }}
        run: |
          set -euo pipefail
          mkdir -p dist
          out="dist/inice-${{ matrix.name }}"
          if [ "$GOOS" = "windows" ]; then
            out="${out}.exe"
          fi
          go build -trimpath -ldflags "-s -w" -o "$out" .
          ls -lh "$out"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: inice-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14
